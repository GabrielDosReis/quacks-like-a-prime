# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: en

# Change to your timezone › https://zones.arilyn.cc
timezone: America/Los_Angeles

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: "If It Quacks Like a Prime"

tagline: "On pseudoprimes, type systems, and the code that passes every test"

description: >-
  A multi-part blog series exploring pseudoprime numbers, their role in
  cryptography, and what they teach us about LLM-generated code, type systems,
  and formal verification.

# Fill in the protocol & hostname for your site.
# E.g. 'https://username.github.io', note that it does not end with a '/'.
url: "https://gabrieldosreis.github.io"
baseurl: "/quacks-like-a-prime"

github:
  username: GabrielDosReis # change to your GitHub username

social:
  name: Gabriel Dos Reis
  links:
    - https://github.com/GabrielDosReis
    # Uncomment below to add more social links
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

theme_mode:

# The CDN endpoint for media resources.
# Notice that once it is assigned, the CDN url
# will be added to all media resources (site avatar, posts' images, audio and video files) paths starting with '/'
#
# e.g. 'https://cdn.com'
# cdn:

# the avatar on sidebar, support local or CORS resources
avatar: https://avatars.githubusercontent.com/u/15849779

math: true          # CRITICAL: enables MathJax globally
mermaid: false      # not needed

paginate: 10

markdown: kramdown

kramdown:
  parse_block_html: true
  input: GFM
  syntax_highlighter: rouge

permalink:  /posts/:title/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true        # auto table-of-contents sidebar
      math: true       # MathJax per post (also settable per-post in front matter)
      pin: false
      image:
        lqip:

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - CHANGELOG.md
  - node_modules


